name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2

    - name: Scan plaintext secrets
      run: bash scripts/verify-secrets.sh

    - name: Validate ARM cross CI contract
      run: bash scripts/verify-arm-ci.sh
    
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run tests
      run: cargo test --all-features

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    
    - name: Build
      run: cargo build --release --all-features

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            just_recipe: arm64
            artifact_name: agbot-aarch64-jetson
          - target: armv7-unknown-linux-gnueabihf
            just_recipe: arm
            artifact_name: agbot-armv7-raspberry-pi
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: docker/setup-qemu-action@v3
    
    - name: Install cross and just
      run: |
        cargo install cross --locked
        cargo install just --locked
      
    - name: Cross compile
      run: just ${{ matrix.just_recipe }}

    - name: Smoke boot target artifacts
      run: scripts/smoke-arm-artifacts.sh ${{ matrix.target }}

    - name: Package target artifacts
      run: scripts/package-arm-artifacts.sh ${{ matrix.target }}

    - name: Upload target artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/arm/${{ matrix.target }}/agbot-${{ matrix.target }}.tar.gz
        if-no-files-found: error

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Validate Dockerfile pins and manifest
      run: bash scripts/verify-container-build.sh
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: agrodrone:${{ github.sha }}
        build-args: |
          AGRODRONE_COMMIT=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
