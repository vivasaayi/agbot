# Delivery robot navigation pipeline: every stage is a named strategy with its
# parameters; swap `algorithm` values to hot-swap implementations.

[pipeline]
sensor_period_s = 0.1
map_period_s = 0.1
plan_period_s = 1.0
local_period_s = 0.05
goal_tolerance_m = 1.0

[vehicle]
algorithm = "kinematic_bicycle"
max_speed_mps = 3.0
max_reverse_speed_mps = 1.0
max_accel_mps2 = 2.5
max_brake_mps2 = 4.0
max_steer_rad = 0.6
max_steer_rate_radps = 2.5
wheelbase_m = 0.8

[sensing]
algorithm = "depth_camera"
width = 32
height = 24
horizontal_fov_deg = 90.0
vertical_fov_deg = 60.0
max_range_m = 30.0
mount_yaw_rad = 0.0
mount_pitch_rad = 0.0
mount_height_m = 0.5
range_noise_a = 0.0
dropout_pct = 0.0
seed = 7

[perception]
algorithm = "height_threshold"
ground_height_m = 0.0
max_step_m = 0.15

[mapping]
algorithm = "occupancy_grid"
origin_x = -10.0
origin_z = -10.0
width = 400
height = 80
resolution_m = 0.25
hit_increment = 128
decay = 0
carve_free = false
inflation_radius_m = 1.0
cost_scaling = 3.0
lethal_threshold = 200

[global]
algorithm = "astar"
lethal_threshold = 200
heuristic_weight = 1.0
cost_weight = 4.0
unknown_cost = 0
smooth = true

[local]
algorithm = "pure_pursuit"
lookahead_m = 2.5
cruise_speed_mps = 2.5
curvature_gain = 1.5
obstacle_slow_start = 80.0
goal_slow_gain = 0.8
min_speed_mps = 0.4
horizon_s = 1.5
rollout_dt_s = 0.1

[control]
algorithm = "pid_stanley"
kp = 1.5
ki = 0.3
kd = 0.0
integral_limit = 2.0
k_e = 1.2
k_soft = 1.0
