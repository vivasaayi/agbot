# Lower Manhattan city extraction pipeline.
# Data: NYC Open Data "Building Footprints" (Socrata dataset 5zhs-2jue),
# fetched by worldgen/tools/fetch_nyc_buildings.sh into data/worldgen/.
# Verified attribute names: height_roof (feet), ground_elevation (feet), bin.

[pipeline]
name = "manhattan_lower"
seed = 42
tile_size_m = 500.0
aoi = { min_lat = 40.700, min_lon = -74.020, max_lat = 40.740, max_lon = -73.980 }

[[layer]]
algorithm = "vector_import"
  [layer.params]
  path = "data/worldgen/manhattan_buildings.geojson"
  height_attr = "height_roof"
  height_units = "feet"
  base_elev_attr = "ground_elevation"
  base_units = "feet"
  levels_attr = ""
  default_level_height_m = 3.0
  default_height_m = 3.0
  class_attr = ""
  default_class = "building"
  id_attr = "bin"
  min_area_m2 = 10.0
  simplify_tol_m = 0.0
  max_features = 0

# --- Optional imagery-based layers (disabled by default) -------------------
# Both layers vectorize class masks from a georeferenced PNG that spans the
# pipeline AOI exactly (row 0 = north edge).

# Classical pseudo-index segmentation (RGB only, no NIR):
#   vegetation via excess green (2g - r - b over chromatic coords) or
#   green_ratio; water via blueness ((B - max(R, G)) / 255).
#
# [[layer]]
# algorithm = "classical_index"
#   [layer.params]
#   imagery_path = "out/imagery/manhattan_rgb.png"
#   veg_method = "exg"        # "exg" | "green_ratio"
#   veg_thresh = 0.08         # use ~0.40 with green_ratio
#   water_method = "blueness"
#   water_thresh = 0.05
#   morph_open_px = 1         # binary opening radius (salt-noise removal)
#   min_area_m2 = 25.0
#   simplify_tol_m = 1.0
#   confidence = 0.6          # fixed confidence for classical masks

# ONNX semantic segmentation (SegFormer-B0 / ADE20K by default; fetch the
# model with worldgen/tools/fetch_seg_model.sh). Compile-gated: without ONNX
# Runtime the layer reports reason code "onnx_runtime_unavailable".
#
# [[layer]]
# algorithm = "onnx_semseg"
#   [layer.params]
#   imagery_path = "out/imagery/manhattan_rgb.png"
#   model_path = "data/models/segformer_b0_ade20k_512.onnx"  # default
#   input_size = 512          # square model input, multiple of 32
#   overlap_px = 64           # tile overlap; center-crop priority stitching
#   execution_provider = "cpu" # "cpu" | "coreml"
#   norm_mean = [0.485, 0.456, 0.406]   # ImageNet (SegFormer default)
#   norm_std = [0.229, 0.224, 0.225]
#   min_area_m2 = 25.0
